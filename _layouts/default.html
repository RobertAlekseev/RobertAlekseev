<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="nav">
    <a href="{{ '/' | relative_url }}" class="nav__logo">RA</a>
    <ul class="nav__links">
      <li><a href="{{ '/cv' | relative_url }}" {% if page.url == '/cv/' %}class="active"{% endif %}>Lebenslauf</a></li>
      <li><a href="{{ '/projekte' | relative_url }}" {% if page.url == '/projekte/' %}class="active"{% endif %}>Projekte</a></li>
      <li><a href="{{ '/dashboard' | relative_url }}" {% if page.url == '/dashboard/' %}class="active"{% endif %}>Dashboard</a></li>
      <li><a href="{{ '/fotografie' | relative_url }}" {% if page.url == '/fotografie/' %}class="active"{% endif %}>Fotografie</a></li>
    </ul>
    <button class="nav__toggle" aria-label="Menü">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="main">
    {{ content }}
  </main>

  <footer class="footer">
    <p>© {{ 'now' | date: "%Y" }} Robert Alekseev</p>
    <div class="footer__links">
      <a href="https://github.com/RobertAlekseev" target="_blank" rel="noopener">GitHub</a>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
